# 复制到 ~/.codex/config.toml，并修改 [projects.*] 中的路径
#
# Codex 连接本地 codex-transfer（端口 4446），不要直连 Infini-AI。
# 完整说明见 docs/INFINI-AI-model-config.md

model_provider = "infini_transfer"
model = "glm-5.2"
review_model = "glm-5.2"
model_reasoning_effort = "high"
disable_response_storage = true
network_access = "enabled"

# 部分 Linux 容器/共享主机上 bwrap 沙箱会失败，RLCR review 会 STALL
sandbox_mode = "danger-full-access"

[model_providers.infini_transfer]
name = "Infini-AI GenStudio via codex-transfer"
base_url = "http://127.0.0.1:4446/v1"
wire_api = "responses"
requires_openai_auth = false

[features]
goals = true
hooks = true

# 每个 Humanize RLCR 工作区加一条（trust_level = "trusted" 必需）
[projects."/path/to/workspace"]
trust_level = "trusted"

[projects."/path/to/another-workspace"]
trust_level = "trusted"
